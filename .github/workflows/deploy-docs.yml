name: Deploy DocC

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container: swift:6.2
    steps:
      - uses: actions/checkout@v6

      - name: Build documentation
        run: ./Scripts/build-docs.sh ./docs swift-nostr

      - name: Add LLM documentation files
        run: |
          cp llms.txt ./docs/llms.txt
          cp llms-full.txt ./docs/llms-full.txt

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}documentation/
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
